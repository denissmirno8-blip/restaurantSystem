<!DOCTYPE html>
<html lang="et">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сoton-tige</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./js/main.js"></script>
</head>

<body>

<div class="conteiner">
    <h2>Laua registreerimine</h2>

    <form action="/api/booking/map" method="GET">
        <label for="date">Pange kuupäeva*</label>
        <br>
        <input type="date" name="date" id="date" class="filter">
        <br>
        <label for="time">Aeg*</label>
        <br>
        <select name="time" id="time" class="filter">
        </select>
        <br>
        <label for="table_size">Inimeste arv*</label>
        <br>
        <input type="number" name="size" id="table_size" class="filter" min="1" , max="6" , step="1" , value="1">
        <br>
        <label for="area_select">Tsoon</label>
        <br>
        <select name="area" id="area_select" class="filter">
        </select>
        <br>
        <fieldset name="preference" class="preferences">
            <legend>Eelistus</legend>
        </fieldset>
        <br>
        <button type="submit">Otsi lauad</button>
    </form>
</div>
</body>

</html>
